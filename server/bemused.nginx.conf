# Nginx configuration for Bemused Music Streaming App
# Install: sudo cp bemused.nginx.conf /etc/nginx/sites-available/bemused
#          sudo ln -sf /etc/nginx/sites-available/bemused /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name patf.com www.patf.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name patf.com www.patf.com;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/patf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/patf.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Static files - frontend app
    location /bemused/app {
        alias /var/www/bemused/shared/public/frontend;
        try_files $uri $uri/ /bemused/app/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Static files - images from NAS
    location /bemused/images/ {
        alias /var/www/bemused/shared/public/images/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Static files - audio streams (note: these are NOT cached)
    location /bemused/mp3s/ {
        alias /var/www/bemused/shared/public/mp3s/;
        # Don't cache audio files
        add_header Cache-Control "no-cache";
    }

    # API endpoints - proxy to Node.js backend
    location /bemused/api/ {
        # Strip /bemused/api prefix and proxy to Node
        rewrite ^/bemused/api/(.*) /$1 break;

        # Allow large file uploads (for audio file upload)
        client_max_body_size 2G;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Direct stream endpoint (if you want /bemused/stream/:id)
    location /bemused/stream/ {
        # Strip /bemused prefix
        rewrite ^/bemused/(.*) /$1 break;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;

        # Critical for audio streaming with range requests
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Connection "";
    }

    # Root bemused path - redirect to app
    location = /bemused {
        return 301 /bemused/app/;
    }

    location = /bemused/ {
        return 301 /bemused/app/;
    }
}
